user:
  default: |
    原始用户请求：{task}

    任务计划书：
    {task_plan}

    所有子任务执行结果：
    {all_results}

    请对照任务计划书中的研究维度和评判标准，生成最终报告。

    📋 撰写要点：
    - 优先确保内容充实详尽，充分利用上述调研数据
    - 如果数据充分，尽量生成有深度、有细节的报告，而非蜻蜓点水
    - 浏览器操作问题统一放在附录，正文只呈现调研成果
