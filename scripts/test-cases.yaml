- id: 1
  type: 明确型
  task: |
    帮我查一下今天北京的天气，我需要知道：
    - 当前温度和全天温度范围（最高温、最低温）
    - 降水概率和风力大小
    - 适合户外活动吗
  eval_criteria: |
    评分标准（每项独立打分，满分100）：
    - 是否包含当前温度及温度范围（0-30分）
    - 是否包含降水概率（0-25分）
    - 是否包含风力信息（0-25分）
    - 是否给出户外活动建议（0-20分）

- id: 2
  type: 明确型
  task: |
    帮我查一下7月1日从北京到上海的高铁信息：
    - 当天最早和最晚一班高铁的发车时间
    - 二等座的票价是多少
    - 全程大概需要多长时间
    - 有哪些不同车次可以选择
  eval_criteria: |
    评分标准（每项独立打分，满分100）：
    - 是否包含最早和最晚发车时间（0-25分）
    - 是否包含二等座票价（0-25分）
    - 是否包含全程用时（0-25分）
    - 是否列出不同车次选择（0-25分）

- id: 3
  type: 明确型
  task: |
    我想买 iPhone 16，帮我对比一下：
    - 苹果官网的价格是多少
    - 京东上的价格是多少
    - 淘宝/天猫上的价格是多少
    - 哪个平台最便宜，差价有多少
    - 各平台有没有分期优惠
  eval_criteria: |
    评分标准（每项独立打分，满分100）：
    - 是否包含官网价格（0-20分）
    - 是否包含京东价格（0-20分）
    - 是否包含淘宝/天猫价格（0-20分）
    - 是否包含平台差价对比（0-20分）
    - 是否包含分期优惠信息（0-20分）

- id: 4
  type: 明确型
  task: |
    帮我详细调研一下中国队在2026世界杯预选赛中的表现，需要覆盖以下几个方面：
    - 整个预选赛系列各场比赛的成绩（胜负平、进球失球）
    - 对阵同级别（亚洲区）队伍的胜负情况
    - 媒体和球迷对球队表现的主要评价
    - 目前小组排名和出线形势分析
    - 关键球员的发挥情况
  eval_criteria: |
    评分标准（每项独立打分，满分100）：
    - 是否包含各场比赛成绩（0-25分）
    - 是否包含对阵亚洲区队伍的胜负分析（0-20分）
    - 是否包含媒体/球迷评价（0-15分）
    - 是否包含小组排名和出线形势（0-25分）
    - 是否包含关键球员分析（0-15分）

