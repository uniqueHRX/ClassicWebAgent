    - 是否推荐至少 3 款机型（0-30分）
    - 是否包含配置信息（0-25分）
    - 是否包含价格（0-25分）
    - 是否有性价比对比分析（0-20分）

- id: 8
  type: 模糊型
  task: |
    最近 AI 领域有什么新突破或值得关注的进展？帮我搜集一下，涵盖大模型、多模态、AI Agent 等方向都可以。
  eval_criteria: |
    评分标准（每项独立打分，满分100）：
    - 是否覆盖至少 2 个 AI 子方向（0-30分）
    - 每条进展是否有具体说明（0-35分）
    - 信息是否有时效性/来源（0-35分）

